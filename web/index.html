<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--bg2:#fafafa;--border:#eee;--text:#111;--text2:#666;--text3:#999;--accent:#5e6ad2;--radius:8px}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.6}
a{color:inherit;text-decoration:none}

/* NAV */
nav{border-bottom:1px solid var(--border);padding:0 32px;position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(12px)}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:48px}
.nav-logo{font-size:14px;font-weight:700;letter-spacing:-.02em}
.nav-logo span{color:var(--accent)}
.nav-r{display:flex;align-items:center;gap:20px;font-size:13px;color:var(--text2)}
.nav-r a:hover{color:var(--text)}
.nav-gh{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:500;transition:border-color .15s}
.nav-gh:hover{border-color:#ccc}
.nav-gh svg{width:14px;height:14px}

/* HERO */
.hero{max-width:960px;margin:0 auto;padding:64px 32px 48px}
.hero h1{font-size:32px;font-weight:700;letter-spacing:-.03em;line-height:1.15;margin-bottom:12px}
.hero p{color:var(--text2);font-size:15px;max-width:440px;margin-bottom:28px}
.hero-meta{display:flex;gap:24px;font-size:13px;color:var(--text3)}
.hero-meta strong{color:var(--text);font-weight:600}

/* FILTERS */
.filters{max-width:960px;margin:0 auto;padding:0 32px 24px;display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:5px 14px;border:1px solid var(--border);border-radius:100px;font-size:12px;font-weight:500;color:var(--text2);background:var(--bg);cursor:pointer;transition:all .15s;font-family:inherit}
.pill:hover{border-color:#ccc;color:var(--text)}
.pill.on{background:var(--text);color:#fff;border-color:var(--text)}
.pill .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}

/* LIST */
.list{max-width:960px;margin:0 auto;padding:0 32px 80px}
.list-header{display:grid;grid-template-columns:1fr 120px 100px 80px;padding:0 0 10px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.row{display:grid;grid-template-columns:1fr 120px 100px 80px;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.row:hover{background:var(--bg2)}
.row-title{display:flex;flex-direction:column;gap:2px;padding-right:16px}
.row-name{font-size:14px;font-weight:600;letter-spacing:-.01em}
.row-desc{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-cat{font-size:12px;color:var(--text2);font-weight:500}
.row-pg{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px}
.row-copy{padding:5px 12px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:600;color:var(--text2);background:var(--bg);cursor:pointer;font-family:inherit;transition:all .15s}
.row-copy:hover{border-color:var(--accent);color:var(--accent)}
.row-copy.ok{border-color:#10b981;color:#10b981}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);z-index:100;justify-content:center;align-items:flex-start;padding:60px 24px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:12px;max-width:580px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.12);animation:up .2s ease}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.modal-head{padding:24px 24px 0;display:flex;justify-content:space-between;align-items:flex-start}
.modal-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);transition:border-color .15s;flex-shrink:0}
.modal-close:hover{border-color:#ccc}
.modal-body{padding:16px 24px 24px}
.modal-cat{display:inline-block;font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.modal h2{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px;line-height:1.25}
.modal-desc{color:var(--text2);font-size:14px;margin-bottom:20px}
.modal-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.modal-tag{padding:3px 10px;border-radius:100px;border:1px solid var(--border);font-size:11px;color:var(--text3);font-weight:500}
.prompt-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;position:relative}
.prompt-label{position:absolute;top:-8px;left:12px;background:var(--bg2);padding:0 5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--accent)}
.prompt-text{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word}
.modal-cta{width:100%;padding:11px;border-radius:var(--radius);border:none;background:var(--text);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.modal-cta:hover{opacity:.85}
.modal-cta.ok{background:#10b981}
.modal-cta svg{width:14px;height:14px}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);padding:8px 18px;background:var(--text);color:#fff;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;z-index:200;opacity:0;transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:14px;height:14px}

/* FOOTER */
footer{text-align:center;padding:32px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}
footer a{color:var(--text2)}
footer a:hover{color:var(--text)}

/* MOBILE CARDS */
@media(max-width:640px){
  .list-header{display:none}
  .row{grid-template-columns:1fr auto;gap:8px;padding:16px 0}
  .row-cat,.row-pg{display:none}
  .hero{padding:40px 20px 32px}
  .hero h1{font-size:24px}
  .filters,.list{padding-left:20px;padding-right:20px}
  nav{padding:0 20px}
}
</style>
</head>
<body>

<nav><div class="nav-inner">
  <div class="nav-logo">Prompt<span>Vault</span></div>
  <div class="nav-r">
    <a href="#list">Prompts</a>
    <a class="nav-gh" href="https://github.com/jesusmoreau/prompts-project" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      Star
    </a>
  </div>
</div></nav>

<section class="hero">
  <h1>Prompts virales de IA,<br>listos para copiar.</h1>
  <p>Probados en Claude, Gemini y ChatGPT. Copia, pega, y obtén resultados increíbles.</p>
  <div class="hero-meta">
    <span><strong id="sT">0</strong> prompts</span>
    <span><strong id="sC">0</strong> categorías</span>
    <span><strong>3</strong> playgrounds</span>
  </div>
</section>

<div class="filters" id="list">
  <button class="pill on" onclick="f('all','all',this)">Todos</button>
  <button class="pill" onclick="f('pg','claude',this)"><span class="dot" style="background:#d97706"></span>Claude</button>
  <button class="pill" onclick="f('pg','gemini',this)"><span class="dot" style="background:#4285f4"></span>Gemini</button>
  <button class="pill" onclick="f('pg','chatgpt',this)"><span class="dot" style="background:#10a37f"></span>ChatGPT</button>
  <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
  <span id="catPills"></span>
</div>

<div class="list">
  <div class="list-header">
    <span>Prompt</span>
    <span>Categoría</span>
    <span>Playground</span>
    <span></span>
  </div>
  <div id="rows"></div>
</div>

<div class="overlay" id="ov"><div class="modal" id="mb"></div></div>
<div class="toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>Copiado</div>

<footer>Creado por <a href="https://github.com/jesusmoreau" target="_blank">Jesus Moreau</a> · <a href="https://github.com/jesusmoreau/prompts-project" target="_blank">GitHub</a></footer>

<script>
const PG={claude:"Claude",gemini:"Gemini",chatgpt:"ChatGPT"};
const PGC={claude:"#d97706",gemini:"#4285f4",chatgpt:"#10a37f"};
let A=[],fType="all",fVal="all";

async function init(){
  try{
    let d;
    try{const r=await fetch("../data/prompts.json");d=await r.json();}
    catch(e){const r=await fetch("data/prompts.json");d=await r.json();}
    A=d.prompts;
    document.getElementById("sT").textContent=d.total;
    const cats=[...new Set(A.map(p=>p.category))];
    document.getElementById("sC").textContent=cats.length;
    let cp="";cats.forEach(c=>{cp+=`<button class="pill" onclick="f('cat','${c}',this)">${cap(c)}</button>`;});
    document.getElementById("catPills").innerHTML=cp;
    render();
  }catch(e){document.getElementById("rows").innerHTML='<div class="empty">No se pudieron cargar los prompts.</div>';}
}

function f(type,val,btn){
  fType=type;fVal=val;
  document.querySelectorAll(".filters .pill").forEach(p=>p.classList.remove("on"));
  btn.classList.add("on");
  render();
}

function render(){
  let l=A;
  if(fType==="pg")l=l.filter(p=>p.target_playground===fVal);
  if(fType==="cat")l=l.filter(p=>p.category===fVal);
  const el=document.getElementById("rows");
  if(!l.length){el.innerHTML='<div class="empty">No hay prompts con este filtro.</div>';return;}
  el.innerHTML=l.map(p=>{
    const pgc=PGC[p.target_playground];
    return`<div class="row" onclick="openM('${p.id}')">
      <div class="row-title"><span class="row-name">${p.title}</span><span class="row-desc">${p.description_es}</span></div>
      <span class="row-cat">${cap(p.category)}</span>
      <span class="row-pg"><span class="dot" style="background:${pgc}"></span>${PG[p.target_playground]}</span>
      <button class="row-copy" onclick="event.stopPropagation();cp('${p.id}',this)">Copiar</button>
    </div>`;
  }).join("");
}

function openM(id){
  const p=A.find(x=>x.id===id);if(!p)return;
  const pgc=PGC[p.target_playground];
  let video="";
  if(p.video_url){
    if(p.video_url.includes("youtube")||p.video_url.includes("youtu.be")){
      const vid=p.video_url.includes("youtu.be")?p.video_url.split("/").pop():new URLSearchParams(new URL(p.video_url).search).get("v");
      video=`<div style="position:relative;padding-bottom:56.25%;height:0;margin-bottom:16px;border-radius:8px;overflow:hidden"><iframe src="https://www.youtube.com/embed/${vid}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0" allowfullscreen></iframe></div>`;
    }else if(p.video_url.includes("tiktok")){
      video=`<a href="${p.video_url}" target="_blank" style="display:block;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:500;margin-bottom:16px">▶ Ver video en TikTok</a>`;
    }
  }
  document.getElementById("mb").innerHTML=`
    <div class="modal-head">
      <div>
        <div class="modal-cat">${cap(p.category)} · <span style="color:var(--text3)">${PG[p.target_playground]}</span></div>
        <h2>${p.title}</h2>
      </div>
      <button class="modal-close" onclick="closeM()">✕</button>
    </div>
    <div class="modal-body">
      <p class="modal-desc">${p.description_es}</p>
      ${video}
      <div class="modal-tags">${p.tags.map(t=>`<span class="modal-tag">#${t}</span>`).join("")}<span class="modal-tag">${cap(p.level)}</span></div>
      <div class="prompt-box"><span class="prompt-label">Prompt</span><div class="prompt-text">${p.prompt_en}</div></div>
      <button class="modal-cta" onclick="cp('${p.id}',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copiar prompt
      </button>
    </div>`;
  document.getElementById("ov").classList.add("open");
}
function closeM(){document.getElementById("ov").classList.remove("open");}
document.getElementById("ov").addEventListener("click",function(e){if(e.target===this)closeM();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeM();});

function cp(id,btn){
  const p=A.find(x=>x.id===id);if(!p)return;
  navigator.clipboard.writeText(p.prompt_en).then(()=>{
    const o=btn.innerHTML;
    btn.classList.add("ok");
    btn.innerHTML=btn.classList.contains("modal-cta")?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="14" height="14"><path d="M20 6L9 17l-5-5"/></svg> ¡Copiado!':'✓';
    toast();
    setTimeout(()=>{btn.innerHTML=o;btn.classList.remove("ok");},2000);
  });
}
function toast(){const t=document.getElementById("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2000);}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
init();
</script>
</body>
</html>
