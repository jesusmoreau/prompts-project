<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompts IA - Colección de Prompts Útiles</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: #14141f;
            --border: #1e1e2e;
            --text: #e4e4ed;
            --subtle: #8888a0;
            --accent-blue: #4a9eff;
            --accent-green: #10a37f;
            --accent-purple: #a855f7;
            --accent-orange: #f97316;
            --accent-red: #ef4444;
            --accent-cyan: #06b6d4;
            --accent-indigo: #6366f1;
            --accent-yellow: #eab308;
            --accent-pink: #ec4899;
            --accent-teal: #14b8a6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }
        .hero {
            text-align: center;
            padding: 80px 20px 60px;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            border-bottom: 1px solid var(--border);
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .hero p {
            color: var(--subtle);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }
        .stat { text-align: center; }
        .stat-num {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-blue);
        }
        .stat-label { color: var(--subtle); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 30px 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .filter-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--subtle);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent-blue);
            color: var(--text);
            background: rgba(74, 158, 255, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
            padding: 20px 40px 80px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(74, 158, 255, 0.1);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .category-pill {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .playground-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
        }
        .card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text);
        }
        .card p {
            color: var(--subtle);
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--subtle);
        }
        .level-dots { display: flex; gap: 4px; }
        .level-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--border);
        }
        .level-dot.filled { background: var(--accent-blue); }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
        .tag {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.05);
            color: var(--subtle);
        }
        .copy-btn {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--accent-blue);
            background: rgba(74, 158, 255, 0.1);
            color: var(--accent-blue);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            margin-top: 12px;
        }
        .copy-btn:hover {
            background: var(--accent-blue);
            color: white;
        }
        .copy-btn.copied {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: white;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 36px;
        }
        .modal h2 { font-size: 1.5rem; margin-bottom: 8px; }
        .modal pre {
            background: #0d0d14;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text);
            margin: 16px 0;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: var(--subtle);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid var(--border);
            color: var(--subtle);
            font-size: 0.85rem;
        }
        .footer a { color: var(--accent-blue); text-decoration: none; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .grid { grid-template-columns: 1fr; padding: 20px; }
            .stats { gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Prompts IA</h1>
        <p>Colección curada de prompts útiles y accionables para Claude, Gemini y ChatGPT. Copia, pega y potencia tu productividad con IA.</p>
        <div class="stats">
            <div class="stat">
                <div class="stat-num" id="totalCount">0</div>
                <div class="stat-label">Prompts</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="catCount">0</div>
                <div class="stat-label">Categorías</div>
            </div>
            <div class="stat">
                <div class="stat-num">3</div>
                <div class="stat-label">Playgrounds</div>
            </div>
        </div>
    </div>

    <div class="filters" id="filters"></div>
    <div class="grid" id="grid"></div>

    <div class="modal-overlay" id="modal">
        <div class="modal" id="modalContent"></div>
    </div>

    <div class="footer">
        Hecho por <a href="https://github.com/jesusmoreau" target="_blank">Jesus Moreau</a> &middot;
        <a href="https://github.com/jesusmoreau/prompts-project" target="_blank">GitHub</a>
    </div>

    <script>
        const catColors = {
            "fitness": "#4caf50",
            "productividad": "#2196f3",
            "escritura creativa": "#9c27b0",
            "programación": "#ff9800",
            "cocina": "#f44336",
            "aprender idiomas": "#00bcd4",
            "estudio": "#3f51b5",
            "negocios": "#ffc107",
            "arte con IA": "#e91e63",
            "viajes": "#009688"
        };

        const playgroundIcons = {
            "claude": "Claude",
            "gemini": "Gemini",
            "chatgpt": "ChatGPT"
        };

        let allPrompts = [];
        let activeFilter = "all";

        async function loadPrompts() {
            try {
                const resp = await fetch("../data/prompts.json");
                const data = await resp.json();
                allPrompts = data.prompts;
                document.getElementById("totalCount").textContent = data.total;
                const cats = [...new Set(allPrompts.map(p => p.category))];
                document.getElementById("catCount").textContent = cats.length;
                renderFilters(cats);
                renderGrid(allPrompts);
            } catch (e) {
                document.getElementById("grid").innerHTML = '<p style="text-align:center;color:var(--subtle);grid-column:1/-1;padding:40px;">Cargando prompts... Si ves esto localmente, sirve con un servidor HTTP:<br><code>python3 -m http.server 8000</code></p>';
            }
        }

        function renderFilters(cats) {
            const container = document.getElementById("filters");
            let html = '<button class="filter-btn active" onclick="filterBy(\'all\', this)">Todos</button>';
            cats.forEach(cat => {
                html += `<button class="filter-btn" onclick="filterBy('${cat}', this)" style="border-color:${catColors[cat]}40">${cat}</button>`;
            });
            container.innerHTML = html;
        }

        function filterBy(cat, btn) {
            activeFilter = cat;
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            const filtered = cat === "all" ? allPrompts : allPrompts.filter(p => p.category === cat);
            renderGrid(filtered);
        }

        function renderGrid(prompts) {
            const grid = document.getElementById("grid");
            if (!prompts.length) {
                grid.innerHTML = '<p style="text-align:center;color:var(--subtle);grid-column:1/-1;">No hay prompts en esta categoría todavía.</p>';
                return;
            }
            grid.innerHTML = prompts.map(p => {
                const color = catColors[p.category] || "#4a9eff";
                const levelNum = p.level === "principiante" ? 1 : p.level === "intermedio" ? 2 : 3;
                const dots = [1,2,3].map(i => `<div class="level-dot ${i <= levelNum ? 'filled' : ''}" style="${i <= levelNum ? 'background:'+color : ''}"></div>`).join("");
                const tags = p.tags.slice(0, 3).map(t => `<span class="tag">#${t}</span>`).join("");
                return `
                <div class="card" onclick="openModal('${p.id}')">
                    <div class="card-header">
                        <span class="category-pill" style="background:${color}20;color:${color};border:1px solid ${color}40">${p.category}</span>
                        <span class="playground-badge">${playgroundIcons[p.target_playground]}</span>
                    </div>
                    <h3>${p.title}</h3>
                    <p>${p.description_es}</p>
                    <div class="tags">${tags}</div>
                    <div class="card-meta">
                        <span>${p.level}</span>
                        <div class="level-dots">${dots}</div>
                    </div>
                    <button class="copy-btn" onclick="event.stopPropagation(); copyPrompt('${p.id}', this)">Copiar Prompt</button>
                </div>`;
            }).join("");
        }

        function openModal(id) {
            const p = allPrompts.find(x => x.id === id);
            if (!p) return;
            const color = catColors[p.category] || "#4a9eff";
            document.getElementById("modalContent").innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:20px;">
                    <span class="category-pill" style="background:${color}20;color:${color};border:1px solid ${color}40">${p.category}</span>
                    <button onclick="closeModal()" style="background:none;border:none;color:var(--subtle);font-size:1.5rem;cursor:pointer">&times;</button>
                </div>
                <h2>${p.title}</h2>
                <p style="color:var(--subtle);margin-bottom:20px;">${p.description_es}</p>
                <h4 style="margin-bottom:8px;color:var(--accent-blue);">Prompt (inglés)</h4>
                <pre id="promptText">${p.prompt_en}</pre>
                <div style="display:flex;gap:10px;margin-bottom:20px;">
                    <span class="playground-badge">${playgroundIcons[p.target_playground]}</span>
                    <span class="playground-badge">${p.level}</span>
                    <span class="playground-badge">${p.created_at.split("T")[0]}</span>
                </div>
                <div class="tags" style="margin-bottom:20px;">${p.tags.map(t => `<span class="tag">#${t}</span>`).join("")}</div>
                <button class="copy-btn" onclick="copyPrompt('${p.id}', this)" style="margin-top:0">Copiar Prompt</button>
            `;
            document.getElementById("modal").classList.add("active");
        }

        function closeModal() {
            document.getElementById("modal").classList.remove("active");
        }

        document.getElementById("modal").addEventListener("click", function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") closeModal();
        });

        function copyPrompt(id, btn) {
            const p = allPrompts.find(x => x.id === id);
            if (!p) return;
            navigator.clipboard.writeText(p.prompt_en).then(() => {
                btn.textContent = "¡Copiado!";
                btn.classList.add("copied");
                setTimeout(() => {
                    btn.textContent = "Copiar Prompt";
                    btn.classList.remove("copied");
                }, 2000);
            });
        }

        loadPrompts();
    </script>
</body>
</html>
